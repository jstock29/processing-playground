name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - master

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    environment: processing-playground
    permissions:
      contents: read
      id-token: write # Required for Workload Identity Federation

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install and Build
        run: |
          npm install
          npm run build

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          project_id: "${{ secrets.GCLOUD_PROJECT_ID }}"
          workload_identity_provider: "projects/${{ secrets.GCLOUD_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
          service_account: "github-deployer@${{ secrets.GCLOUD_PROJECT_ID }}.iam.gserviceaccount.com"

      - name: Debug auth state
        run: |
          echo "=== Credentials file path ==="
          echo "$GOOGLE_APPLICATION_CREDENTIALS"
          echo "=== File exists? ==="
          ls -la "$GOOGLE_APPLICATION_CREDENTIALS" 2>&1 || echo "FILE MISSING"
          echo "=== Credentials type ==="
          python3 -c "import json,os; f=os.environ.get('GOOGLE_APPLICATION_CREDENTIALS',''); d=json.load(open(f)) if f else {}; print('type:', d.get('type','NOT SET'))" 2>&1
          echo "=== gcloud auth list ==="
          gcloud auth list 2>&1
          echo "=== gcloud ADC token test ==="
          gcloud auth application-default print-access-token 2>&1 | head -c 30 && echo " ...truncated"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Apply
        working-directory: ./terraform
        run: |
          terraform init
          terraform apply -auto-approve
        env:
          TF_VAR_project_id: ${{ secrets.GCLOUD_PROJECT_ID }}

      - name: Deploy to Firebase
        run: |
          npx firebase-tools deploy --only hosting:processing-playground --project ${{ secrets.GCLOUD_PROJECT_ID }}

